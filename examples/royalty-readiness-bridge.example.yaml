    confidence: 0.92
    review_required: false

unresolved_items:
  - issue_id: unresolved-readiness-ai-001
    issue_type: overlap_unresolved
    related_ref: contribution-claim-ai-001

    description: >-
      The AI recommendation claim overlaps with the human decision claim,
      and the recognized beneficiary endpoint remains provisional.

    blocking: true
    resolution_status: under_review

readiness_summary:
  overall_status: conditionally_ready
  readiness_boundary: no_allocation_share_royalty_amount_or_payment_execution

  ready_claim_count: 3
  conditional_claim_count: 0
  blocked_claim_count: 1
  excluded_claim_count: 0

  blocking_gate_refs:
    - gate-ai-overlap-001
    - gate-ai-endpoint-001

  blocking_issue_refs:
    - unresolved-readiness-ai-001

  ready_candidate_refs:
    - candidate-human-001
    - candidate-telecom-001
    - candidate-finance-001

  required_downstream_actions:
    - Calculate allocation shares under the downstream policy.
    - Perform identity, tax, sanctions, and settlement checks.
    - Exclude the blocked AI claim unless its blocking issues are resolved.

  summary_note: >-
    Three claims are ready for downstream allocation assessment.
    The AI transformation claim remains blocked and is excluded
    from the current handoff package.

royalty_handoff:
  handoff_id: royalty-handoff-2026-0001
  handoff_status: prepared
  target_protocol: allocation_readiness_protocol

  included_claim_refs:
    - contribution-claim-human-001
    - contribution-claim-telecom-001
    - contribution-claim-finance-001

  included_candidate_refs:
    - candidate-human-001
    - candidate-telecom-001
    - candidate-finance-001

  endpoint_refs:
    - endpoint-human-platform-001
    - endpoint-telecom-contract-001
    - endpoint-finance-contract-001

  constraint_summary:
    - No allocation percentage is defined by this record.
    - No royalty amount is defined by this record.
    - The AI claim is excluded from the current handoff.
    - Downstream compliance and settlement checks remain mandatory.

  required_downstream_actions:
    - Apply the selected allocation policy.
    - Produce an auditable allocation decision record.
    - Obtain final settlement authorization before payment.

  execution_boundary: handoff_only_no_allocation_calculation_or_payment_execution

review:
  review_status: approved
  reviewer_ref: human-royalty-readiness-reviewer-001
  reviewed_at: "2026-07-14T03:05:00Z"

  review_notes: >-
    The reviewer approved a partial handoff for the human, telecom,
    and financial claims. The AI claim remains blocked.

  audit_refs:
    - ref_id: royalty-readiness-audit-001
      ref_type: audit
      uri: https://example.org/audits/royalty-readiness-audit-001

bridge_status: conditionally_ready

notes: >-
  This bridge records readiness for downstream allocation and royalty
  processing. It does not determine ownership, allocation percentages,
  royalty amounts, tax treatment, settlement instructions, or payment.
